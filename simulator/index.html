<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stradale - Telemetry Data Acquisition</title>
    <!-- Google Fonts for Monospace style -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #080808;
            --panel-border: #222222;
            --text-color: #d0d0d0;
            --accent-green: #00ff66;
            --accent-cyan: #00e5ff;
            --accent-yellow: #ffea00;
            --accent-red: #ff3d00;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0 !important; /* Force square race-dash aesthetics */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            padding: 15px;
            font-size: 13px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .sys-status {
            font-size: 11px;
            color: var(--accent-green);
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid var(--accent-green);
            padding: 2px 6px;
            margin-left: 10px;
            display: inline-block;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 15px;
        }

        .panel-header {
            font-size: 12px;
            font-weight: 700;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 8px;
            display: flex;
            justify-content: space-between;
        }

        /* Telemetry HUD layout */
        .hud-row {
            border-bottom: 1px solid var(--panel-border);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .hud-row:last-child {
            border-bottom: none;
        }

        .hud-label {
            font-size: 11px;
            color: #666666;
            font-weight: 700;
            text-transform: uppercase;
        }

        .hud-val-container {
            text-align: right;
        }

        .hud-value {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
        }

        .hud-unit {
            font-size: 10px;
            color: #888888;
            margin-left: 3px;
        }

        /* Shift Lights Bar at top of HUD */
        .shift-lights {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            border: 1px solid var(--panel-border);
            padding: 4px;
            background: #020202;
        }

        .light-dot {
            height: 10px;
            flex-grow: 1;
            background: #111111;
            border: 1px solid #222222;
        }

        .light-dot.green { background: #008822; }
        .light-dot.green.active { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .light-dot.yellow { background: #888800; }
        .light-dot.yellow.active { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }
        .light-dot.red { background: #880000; }
        .light-dot.red.active { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        /* Canvas visualizer */
        canvas#trackCanvas {
            width: 100%;
            height: 160px;
            background: #000000;
            border: 1px solid var(--panel-border);
        }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 220px;
            border: 1px solid var(--panel-border);
            background: #020202;
            padding: 10px;
        }

        .control-panel {
            display: flex;
            gap: 8px;
        }

        select, button {
            background: #000000;
            border: 1px solid var(--panel-border);
            color: var(--text-color);
            padding: 6px 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        select:hover, button:hover {
            border-color: var(--accent-cyan);
            color: #ffffff;
        }

        button.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: #000000;
        }

        .grade-tag {
            font-weight: 700;
            padding: 2px 5px;
            font-size: 11px;
            border: 1px solid transparent;
        }
        .grade-flat { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .grade-up { border-color: var(--accent-green); color: var(--accent-green); }
        .grade-down { border-color: var(--accent-red); color: var(--accent-red); }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>STRADALE DATA ACQUISITION <span class="sys-status">SYS.ACTIVE</span></h1>
        </div>
        <div class="control-panel">
            <select id="gradeSelect" onchange="loadSimulationData()">
                <option value="simulation_log_flat.json">RUN: FLAT (0% GRADE)</option>
                <option value="simulation_log_uphill.json">RUN: UPHILL (+5% GRADE)</option>
                <option value="simulation_log_downhill.json">RUN: DOWNHILL (-5% GRADE)</option>
            </select>
            <button id="playBtn" onclick="togglePlayback()">PLAY</button>
            <button onclick="resetPlayback()">RESET</button>
        </div>
    </header>

    <div class="dashboard">
        <!-- Telemetry Details & Visualizer -->
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div class="panel">
                <div class="panel-header">HUD Telemetry Dashboard <span>Acq. Ch 1</span></div>
                
                <!-- RPM/Shift Light simulation strip -->
                <div class="shift-lights" id="shiftStrip">
                    <div class="light-dot green"></div>
                    <div class="light-dot green"></div>
                    <div class="light-dot green"></div>
                    <div class="light-dot green"></div>
                    <div class="light-dot yellow"></div>
                    <div class="light-dot yellow"></div>
                    <div class="light-dot yellow"></div>
                    <div class="light-dot red"></div>
                    <div class="light-dot red"></div>
                    <div class="light-dot red"></div>
                </div>

                <div class="hud-row">
                    <span class="hud-label">SPEED</span>
                    <div class="hud-val-container">
                        <span class="hud-value" id="hudSpeed" style="color: var(--accent-green);">0.0</span>
                        <span class="hud-unit">km/h</span>
                    </div>
                </div>
                <div class="hud-row">
                    <span class="hud-label">ACCELERATION</span>
                    <div class="hud-val-container">
                        <span class="hud-value" id="hudAcceleration" style="color: var(--accent-yellow);">0.00</span>
                        <span class="hud-unit">G</span>
                    </div>
                </div>
                <div class="hud-row">
                    <span class="hud-label">DISPLACEMENT</span>
                    <div class="hud-val-container">
                        <span class="hud-value" id="hudDistance">0.0</span>
                        <span class="hud-unit">m</span>
                    </div>
                </div>
                <div class="hud-row">
                    <span class="hud-label">TRACK SLOPE</span>
                    <div class="hud-val-container">
                        <span class="hud-value grade-tag" id="hudGrade">0%</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Oscilloscope Position Tracker</div>
                <canvas id="trackCanvas" width="600" height="150"></canvas>
            </div>
        </div>

        <!-- Telemetry Graphs -->
        <div class="panel" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="panel-header">Real-Time Telemetry Log Plots</div>
            <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 15px; flex-grow: 1;">
                <div class="chart-container">
                    <canvas id="speedChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="forceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let simData = [];
        let currentIndex = 0;
        let isPlaying = false;
        let animationFrameId = null;
        let speedChart = null;
        let forceChart = null;

        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');

        async function loadSimulationData() {
            resetPlayback();
            const filename = document.getElementById('gradeSelect').value;
            try {
                const response = await fetch(filename);
                simData = await response.json();
                currentIndex = 0;
                
                setupCharts();
                drawTrackFrame();
                updateHUD();
            } catch (err) {
                console.error("Failed to load data:", err);
                ctx.fillStyle = "#ff3d00";
                ctx.font = "12px 'JetBrains Mono'";
                ctx.fillText("DATA ACQ ERROR: RUN SIMULATOR.EXE FIRST", 20, 40);
            }
        }

        function setupCharts() {
            const times = simData.map(d => d.time.toFixed(2));
            const speeds = simData.map(d => (d.velocity * 3.6).toFixed(1)); // m/s to km/h
            const accelerations = simData.map(d => (d.acceleration / 9.80665).toFixed(2)); // to Gs
            
            const fEngine = simData.map(d => d.F_engine.toFixed(0));
            const fDrag = simData.map(d => d.F_drag.toFixed(0));
            const fRR = simData.map(d => d.F_rr.toFixed(0));
            const fGrade = simData.map(d => d.F_grade.toFixed(0));

            if (speedChart) speedChart.destroy();
            if (forceChart) forceChart.destroy();

            const chartFont = { family: 'JetBrains Mono', size: 10 };
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#888888', font: chartFont } }
                },
                scales: {
                    x: { ticks: { color: '#666666', font: chartFont }, grid: { color: '#111111' } },
                    y: { ticks: { color: '#666666', font: chartFont }, grid: { color: '#111111' } }
                }
            };

            // Speed & G-Force Chart
            speedChart = new Chart(document.getElementById('speedChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [
                        { label: 'SPD (km/h)', data: speeds, borderColor: '#00e5ff', borderWidth: 1.5, yAxisID: 'y', pointRadius: 0, tension: 0 },
                        { label: 'ACC (G)', data: accelerations, borderColor: '#00ff66', borderWidth: 1.5, yAxisID: 'y1', pointRadius: 0, tension: 0 }
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: { position: 'left', ticks: { color: '#00e5ff', font: chartFont }, grid: { color: '#111111' } },
                        y1: { position: 'right', ticks: { color: '#00ff66', font: chartFont }, grid: { drawOnChartArea: false } }
                    }
                }
            });

            // Forces Chart
            forceChart = new Chart(document.getElementById('forceChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [
                        { label: 'F_ENG (N)', data: fEngine, borderColor: '#ffea00', borderWidth: 1.5, pointRadius: 0, tension: 0 },
                        { label: 'F_DRAG (N)', data: fDrag, borderColor: '#ff3d00', borderWidth: 1.5, pointRadius: 0, tension: 0 },
                        { label: 'F_RR (N)', data: fRR, borderColor: '#888888', borderWidth: 1, borderDash: [4,4], pointRadius: 0, tension: 0 },
                        { label: 'F_GRADE (N)', data: fGrade, borderColor: '#ab7df6', borderWidth: 1.5, pointRadius: 0, tension: 0 }
                    ]
                },
                options: commonOptions
            });
        }

        function updateHUD() {
            if (simData.length === 0 || currentIndex >= simData.length) return;
            const data = simData[currentIndex];

            const speedKmh = data.velocity * 3.6;
            document.getElementById('hudSpeed').textContent = speedKmh.toFixed(1);
            document.getElementById('hudAcceleration').textContent = (data.acceleration / 9.80665).toFixed(2);
            document.getElementById('hudDistance').textContent = data.position.toFixed(1);
            
            const gradeSelectVal = document.getElementById('gradeSelect').value;
            const gradeLabel = document.getElementById('hudGrade');
            if (gradeSelectVal.includes('flat')) {
                gradeLabel.textContent = "0.0%";
                gradeLabel.className = "hud-value grade-tag grade-flat";
            } else if (gradeSelectVal.includes('uphill')) {
                gradeLabel.textContent = "+5.0%";
                gradeLabel.className = "hud-value grade-tag grade-up";
            } else {
                gradeLabel.textContent = "-5.0%";
                gradeLabel.className = "hud-value grade-tag grade-down";
            }

            // Simulate Shift Lights strip based on vehicle speed
            const shiftStrip = document.getElementById('shiftStrip');
            const dots = shiftStrip.getElementsByClassName('light-dot');
            const ratio = speedKmh / 220.0; // Assume top speed is 220 km/h for indicator limit
            const activeDotsCount = Math.min(Math.floor(ratio * dots.length), dots.length);
            
            for (let i = 0; i < dots.length; ++i) {
                if (i < activeDotsCount) {
                    dots[i].classList.add('active');
                } else {
                    dots[i].classList.remove('active');
                }
            }

            // Highlight index in charts
            if (speedChart && forceChart) {
                speedChart.setActiveElements([{ datasetIndex: 0, index: currentIndex }]);
                speedChart.update();
                forceChart.setActiveElements([{ datasetIndex: 0, index: currentIndex }]);
                forceChart.update();
            }
        }

        function drawTrackFrame() {
            if (simData.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw oscilloscope grid
            ctx.strokeStyle = "#111111";
            ctx.lineWidth = 1;
            const gridSize = 25;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            const roadY = canvas.height / 2 + 15;
            const roadHeight = 2;

            // Draw flat reference line
            ctx.strokeStyle = "#333333";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, roadY);
            ctx.lineTo(canvas.width, roadY);
            ctx.stroke();

            // Draw start/end markers
            ctx.fillStyle = "#555555";
            ctx.font = "9px 'JetBrains Mono'";
            ctx.fillText("START: 0 m", 40, roadY - 12);
            ctx.fillText("END: 1000 m", canvas.width - 110, roadY - 12);

            // Draw vehicle
            const currentPosition = simData[currentIndex].position;
            const maxPosition = 1000.0;
            const margin = 50;
            
            // Map position to canvas x
            const carX = margin + (currentPosition / maxPosition) * (canvas.width - 2 * margin);

            // Draw barebones race-car block
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(carX - 10, roadY - 12, 20, 10); // box chassis
            
            // Draw wheels as simple rectangles
            ctx.fillStyle = "#00ff66";
            ctx.fillRect(carX - 8, roadY - 2, 4, 3);
            ctx.fillRect(carX + 4, roadY - 2, 4, 3);

            // Force vectors representation
            const fEngine = simData[currentIndex].F_engine;
            const fDrag = simData[currentIndex].F_drag;
            const fRR = simData[currentIndex].F_rr;
            const fGrade = simData[currentIndex].F_grade;

            // Tractive vector (green line)
            const forwardScale = 0.006;
            const forwardVector = fEngine * forwardScale;
            ctx.strokeStyle = "#00ff66";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(carX + 10, roadY - 7);
            ctx.lineTo(carX + 10 + forwardVector, roadY - 7);
            ctx.stroke();
            // Arrowhead
            ctx.fillStyle = "#00ff66";
            ctx.beginPath();
            ctx.moveTo(carX + 10 + forwardVector, roadY - 10);
            ctx.lineTo(carX + 15 + forwardVector, roadY - 7);
            ctx.lineTo(carX + 10 + forwardVector, roadY - 4);
            ctx.fill();

            // Drag + resistance vector (red line)
            const opposingVector = (fDrag + fRR + fGrade) * forwardScale;
            ctx.strokeStyle = "#ff3d00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(carX - 10, roadY - 7);
            ctx.lineTo(carX - 10 - opposingVector, roadY - 7);
            ctx.stroke();
            // Arrowhead
            ctx.fillStyle = "#ff3d00";
            ctx.beginPath();
            ctx.moveTo(carX - 10 - opposingVector, roadY - 10);
            ctx.lineTo(carX - 15 - opposingVector, roadY - 7);
            ctx.lineTo(carX - 10 - opposingVector, roadY - 4);
            ctx.fill();
        }

        function togglePlayback() {
            const playBtn = document.getElementById('playBtn');
            if (isPlaying) {
                isPlaying = false;
                playBtn.textContent = "PLAY";
                cancelAnimationFrame(animationFrameId);
            } else {
                isPlaying = true;
                playBtn.textContent = "PAUSE";
                playbackStep();
            }
        }

        function playbackStep() {
            if (!isPlaying) return;
            
            currentIndex += 1;
            if (currentIndex >= simData.length) {
                currentIndex = 0;
            }
            
            updateHUD();
            drawTrackFrame();
            
            // Limit animation rate
            setTimeout(() => {
                animationFrameId = requestAnimationFrame(playbackStep);
            }, 60); 
        }

        function resetPlayback() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = "PLAY";
            cancelAnimationFrame(animationFrameId);
            currentIndex = 0;
            updateHUD();
            drawTrackFrame();
        }

        // Initialize on load
        window.onload = loadSimulationData;
    </script>
</body>
</html>
